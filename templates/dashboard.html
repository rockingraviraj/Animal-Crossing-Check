<!DOCTYPE html>
<html>

<head>

<title>Animal Crossing Detection</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>Animal Crossing Detection System</h1>

<div class="status-card">

<h2>Detection Status</h2>

<p id="status" class="status {{color}}">
{{icon}} {{status}}
</p>

</div>

<div class="graph-card">

<h2>Real-Time CSI Signal</h2>

<canvas id="signalChart" width="800" height="300"></canvas>

</div>

</div>

<script>

let ctx = document.getElementById('signalChart').getContext('2d');

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: Array(100).fill(""),
        datasets: [{
            label: 'Signal',
            data: {{ signal | tojson }},
            borderColor: 'blue',
            borderWidth: 2,
            fill: false
        }]
    },
    options: {
        animation: false,
        responsive: true,
        scales: {
            y: { beginAtZero: true }
        }
    }
});

function updateDetection(){

fetch("/detect")
.then(res => res.json())
.then(data => {

document.getElementById("status").innerHTML =
data.icon + " " + data.status;

document.getElementById("status").className =
"status " + data.color;

// 🔥 FIXED GRAPH UPDATE
chart.data.labels = Array(data.signal.length).fill("");

chart.data.datasets[0].data = [...data.signal];

chart.update('none');

});
}

// 🔥 FAST SMOOTH UPDATE
setInterval(updateDetection, 1500);

</script>

</body>

</html>
