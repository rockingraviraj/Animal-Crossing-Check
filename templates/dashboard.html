<!DOCTYPE html>
<html>

<head>

<title>Animal Crossing Detection</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">
    <h2>🐾 Animal Detection System</h2>

    <div>
        <a href="/">Dashboard</a>
        <a href="/stats">Stats</a>
    </div>
</div>

<div class="container">

<h1>Animal Crossing Detection System</h1>

<h3>Real-Time Monitoring Active 🟢</h3>

<a href="/stats">View Stats</a>

<!-- 🔥 STATUS CARD -->
<div class="status-card">

<h2>Detection Status</h2>

<p id="status" class="status {{color}}">
{{icon}} {{status}}
</p>

<p id="confidence">
Confidence: {{confidence}}%
</p>

</div>

<!-- 🔥 GRAPH CARD -->
<div class="graph-card">

<h2>Real-Time CSI Signal</h2>

<canvas id="signalChart" width="800" height="300"></canvas>

</div>

</div>

<script>

// 🔥 GRAPH INIT
let ctx = document.getElementById('signalChart').getContext('2d');

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: Array(100).fill(""),
        datasets: [{
            label: 'Signal',
            data: {{ signal | tojson }},
            borderColor: 'blue',
            borderWidth: 2,
            fill: false
        }]
    },
    options: {
        animation: false,
        responsive: true,
        scales: {
            y: { beginAtZero: true }
        }
    }
});

// 🔥 LIVE UPDATE FUNCTION
function updateDetection(){

fetch("/detect")
.then(res => res.json())
.then(data => {

let statusEl = document.getElementById("status");
let confEl = document.getElementById("confidence");

// 🔥 STATUS UPDATE
statusEl.innerHTML = data.icon + " " + data.status;
statusEl.className = "status " + data.color;

// 🔥 CONFIDENCE UPDATE
let confText = "Confidence: " + data.confidence + "%";
confEl.innerHTML = confText;

// 🔥 COLOR BASED CONFIDENCE
if(data.confidence > 85){
    confEl.style.color = "green";
}else{
    confEl.style.color = "orange";
}

// 🔥 GRAPH UPDATE
chart.data.labels = Array(data.signal.length).fill("");
chart.data.datasets[0].data = [...data.signal];
chart.update('none');

});
}

// 🔥 AUTO REFRESH
setInterval(updateDetection, 1500);

</script>

</body>

</html>
